version: "3.9"

services:
  roco-api:
    # 方式一：使用预构建镜像（推荐）
    # image: ghcr.io/your-username/roco-api:latest

    # 方式二：本地构建
    build:
      context: .
      dockerfile: Dockerfile

    container_name: roco-api
    restart: unless-stopped

    ports:
      - "8008:8008"

    volumes:
      # 挂载配置文件（修改配置无需重新构建镜像）
      - ./config.json:/app/config.json

    environment:
      - TZ=Asia/Shanghai

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
